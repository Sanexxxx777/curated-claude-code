<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Curated Claude Code — a small, vetted, self-evolving harness for Claude Code">
  <!-- background -->
  <rect width="1280" height="640" fill="#ffffff"/>
  <rect width="1280" height="640" fill="#f8fafc"/>
  <rect x="0" y="0" width="1280" height="10" fill="#16a34a"/>

  <!-- giant watermark funnel on the right -->
  <g transform="translate(840,150) scale(3.0)" opacity="0.07">
    <path d="M6 40 H108 L70 84 V108 L44 120 V84 Z" fill="none" stroke="#16a34a" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="50" cy="138" r="7" fill="#16a34a"/>
    <circle cx="88" cy="132" r="16" fill="#16a34a"/>
  </g>

  <!-- small crisp funnel mark, top-left of content -->
  <g transform="translate(96,96)">
    <circle cx="16" cy="10" r="5" fill="#cbd5e1"/>
    <circle cx="40" cy="6"  r="7" fill="#cbd5e1"/>
    <circle cx="64" cy="12" r="4" fill="#94a3b8"/>
    <circle cx="50" cy="22" r="4" fill="#cbd5e1"/>
    <path d="M4 34 H92 L60 72 V92 L38 102 V72 Z" fill="none" stroke="#475569" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="44" cy="116" r="6" fill="#16a34a"/>
    <circle cx="76" cy="112" r="15" fill="#16a34a"/>
    <path d="M69 112 l5 5 l9 -11" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="232" y="180" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#334155">Curated <tspan fill="#16a34a">Claude Code</tspan></text>
  <text x="236" y="226" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#94a3b8" letter-spacing="2">vetted · safe · self-evolving</text>

  <!-- pitch -->
  <text x="96" y="320" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="600" fill="#475569">A small, vetted, self-evolving harness for Claude Code.</text>
  <text x="96" y="372" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#16a34a">Curated, not dumped.</text>

  <!-- feature chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600">
    <g transform="translate(96,420)">
      <rect width="170" height="52" rx="26" fill="#dcfce7"/><text x="85" y="34" text-anchor="middle" fill="#16a34a">9 skills</text>
    </g>
    <g transform="translate(282,420)">
      <rect width="180" height="52" rx="26" fill="#dcfce7"/><text x="90" y="34" text-anchor="middle" fill="#16a34a">2 agents</text>
    </g>
    <g transform="translate(478,420)">
      <rect width="230" height="52" rx="26" fill="#f1f5f9"/><text x="115" y="34" text-anchor="middle" fill="#475569">safety-first</text>
    </g>
    <g transform="translate(724,420)">
      <rect width="250" height="52" rx="26" fill="#f1f5f9"/><text x="125" y="34" text-anchor="middle" fill="#475569">no auto-hooks</text>
    </g>
  </g>

  <!-- differentiator line -->
  <text x="96" y="528" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-style="italic" fill="#64748b">Not a 500-block dump — a harness that grows itself, safely.</text>

  <!-- footer: signature + repo -->
  <g transform="translate(96,572)">
    <circle cx="11" cy="11" r="11" fill="#229ED9"/>
    <path d="M5.3 11.1 L16.4 6.8 C17.0 6.6 17.5 6.9 17.3 7.8 L15.4 16.2 C15.3 16.8 14.9 16.9 14.4 16.7 L11.7 14.6 L10.4 15.9 C10.3 16.0 10.1 16.1 9.9 16.1 L10.1 13.4 L14.7 9.3 C14.9 9.1 14.6 9.0 14.4 9.2 L8.8 12.6 L6.4 11.9 C5.8 11.7 5.8 11.3 6.5 11.1 Z" fill="#ffffff"/>
    <text x="30" y="18" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#475569">@Aleksandr_NFA</text>
    <text x="240" y="18" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#94a3b8">· github.com/Sanexxxx777/curated-claude-code</text>
  </g>
</svg>
