<svg width="700" height="200" viewBox="0 0 700 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Curated Claude Code by @Aleksandr_NFA">
  <!-- icon: a funnel that filters a dump into a vetted few -->
  <g transform="translate(30,34)">
    <!-- scattered "dump" above the funnel -->
    <circle cx="20" cy="12" r="5" fill="#94a3b8"/>
    <circle cx="44" cy="8"  r="7" fill="#cbd5e1"/>
    <circle cx="68" cy="14" r="4" fill="#94a3b8"/>
    <circle cx="90" cy="9"  r="6" fill="#cbd5e1"/>
    <circle cx="33" cy="26" r="4" fill="#cbd5e1"/>
    <circle cx="78" cy="27" r="5" fill="#94a3b8"/>
    <circle cx="56" cy="24" r="4" fill="#cbd5e1"/>
    <!-- funnel -->
    <path d="M6 40 H108 L70 84 V108 L44 120 V84 Z" fill="none" stroke="#475569" stroke-width="5" stroke-linejoin="round"/>
    <!-- the vetted few coming out -->
    <circle cx="50" cy="134" r="6" fill="#16a34a"/>
    <!-- check mark badge -->
    <circle cx="86" cy="130" r="16" fill="#16a34a"/>
    <path d="M78 130 l6 6 l10 -12" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- wordmark -->
  <text x="178" y="86" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#64748b">Curated <tspan fill="#16a34a">Claude Code</tspan></text>
  <text x="180" y="120" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#94a3b8" letter-spacing="1.5">vetted · safe · self-evolving</text>
  <!-- author signature with telegram glyph -->
  <g transform="translate(180,150)">
    <circle cx="9" cy="9" r="9" fill="#229ED9"/>
    <path d="M4.3 9.1 L13.4 5.6 C13.9 5.4 14.3 5.7 14.1 6.4 L12.6 13.3 C12.5 13.8 12.2 13.9 11.8 13.7 L9.6 12.0 L8.5 13.0 C8.4 13.1 8.3 13.2 8.1 13.2 L8.3 11.0 L12.0 7.6 C12.2 7.5 12.0 7.4 11.8 7.5 L7.2 10.3 L5.2 9.7 C4.7 9.6 4.7 9.3 5.3 9.1 Z" fill="#ffffff"/>
    <text x="24" y="14" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#64748b">@Aleksandr_NFA</text>
  </g>
